name: Flutter Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Disable macOS Code Signing
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = DM3F8VR243;/DEVELOPMENT_TEAM = "";/g' macos/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' macos/Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGN_IDENTITY = " >> macos/Runner/Configs/AppInfo.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> macos/Runner/Configs/AppInfo.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> macos/Runner/Configs/AppInfo.xcconfig

      - name: Build macOS App
        run: flutter build macos --release

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-macos
          path: build/macos/Build/Products/Release/proxypin.app

      - name: Package macOS App
        run: |
          cd build/macos/Build/Products/Release
          zip -r proxypin-macos.zip proxypin.app

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-build-${{ github.run_number }}
          name: "Nightly Build #${{ github.run_number }}"
          files: build/macos/Build/Products/Release/proxypin-macos.zip
